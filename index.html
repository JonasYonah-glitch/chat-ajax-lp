    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "O que é o Chat Ajax?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "O Chat Ajax é uma plataforma de atendimento multicanal com IA que centraliza WhatsApp, Instagram, TikTok, Email, Telegram, Messenger e outros canais em uma única tela. Ele permite que equipes gerenciem conversas, automatizem respostas e acompanhem métricas de atendimento em tempo real."
          }
        },
        {
          "@type": "Question",
          "name": "Quais canais são suportados?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Atualmente suportamos WhatsApp (API Oficial Cloud, Twilio, 360dialog), Instagram DM, TikTok, Facebook Messenger, Telegram, Email (IMAP/SMTP/Microsoft 365), SMS (Twilio), LINE, Google Business Messages e Website Live Chat."
          }
        },
        {
          "@type": "Question",
          "name": "O que é o Captain AI?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "O Captain AI é nosso assistente de inteligência artificial integrado. Ele sugere respostas em tempo real, resume conversas longas, classifica o sentimento do cliente, gera respostas automáticas e pode resolver até 70% dos tickets sem intervenção humana."
          }
        },
        {
          "@type": "Question",
          "name": "Preciso de conhecimento técnico para usar?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Não! O Chat Ajax foi projetado para ser intuitivo. A configuração dos canais é feita em poucos cliques com assistentes guiados. Para integrações avançadas, oferecemos documentação completa, API REST e suporte técnico dedicado."
          }
        },
        {
          "@type": "Question",
          "name": "Qual a diferença entre Chat Ajax e ManyChat?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "O Chat Ajax vai além do ManyChat ao oferecer uma inbox verdadeiramente unificada com todos os canais (não apenas Instagram e WhatsApp), IA nativa com Captain AI, CRM integrado com Kanban, SLA e audit logs, além de suporte a canais como TikTok, Telegram, LINE e Voice."
          }
        },
        {
          "@type": "Question",
          "name": "Posso testar antes de pagar?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sim! Oferecemos 14 dias grátis em todos os planos, sem necessidade de cartão de crédito. Você tem acesso completo a todas as funcionalidades do plano escolhido durante o período de teste."
          }
        },
        {
          "@type": "Question",
          "name": "O Chat Ajax é seguro e compatível com LGPD?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sim. Todos os dados são criptografados em trânsito (TLS 1.3) e em repouso (AES-256). Somos compatíveis com LGPD, oferecemos controle de consentimento, anonimização de dados e exportação/exclusão sob demanda. Nossos servidores ficam no Brasil."
          }
        }
      ]
    }

          document.head.appendChild(g);
          g.onload=function(){
            window.chatwootSDK.run({websiteToken:'ASFafFfpkZEpQG4AKJxUKinz',baseUrl:BASE_URL})
          }
        }
        // Load on first user interaction or after 8s idle
        var events=['scroll','click','touchstart'];
        events.forEach(function(e){document.addEventListener(e,loadChatwoot,{once:true,passive:true})});
        setTimeout(loadChatwoot,8000);
